services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-groupwise
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_CUSTOM_EXTENSIONS=/opt/custom-nodes/n8n-nodes-groupwise-imap
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
